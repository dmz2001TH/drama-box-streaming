<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DramaBox - ดูซีรีส์ฟรี</title>
<link rel="preconnect" href="https://img.webfic.com">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;--card:#14141f;--card-hover:#1a1a2e;
  --text:#e8e8f0;--text-dim:#8888a0;--accent:#e94560;
  --accent2:#c23152;--grad1:#e94560;--grad2:#0f3460;
  --border:#1e1e30;--surface:#181828;
  --radius:12px;--radius-sm:8px;
}
html{font-size:14px;scroll-behavior:smooth}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans Thai',sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100vh;overflow-x:hidden;
}
a{color:inherit;text-decoration:none}
img{display:block;max-width:100%}

/* Header */
.header{
  position:sticky;top:0;z-index:100;
  background:rgba(10,10,15,0.92);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);padding:0 16px;
}
.header-inner{
  max-width:1200px;margin:0 auto;
  display:flex;align-items:center;gap:12px;height:56px;
}
.logo{
  font-size:1.5rem;font-weight:800;
  background:linear-gradient(135deg,var(--grad1),#ff6b81);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  white-space:nowrap;
}
.logo span{-webkit-text-fill-color:var(--text-dim);font-weight:400;font-size:.7rem;margin-left:2px}
.search-box{
  flex:1;max-width:400px;position:relative;
}
.search-box input{
  width:100%;padding:8px 12px 8px 36px;border-radius:20px;
  border:1px solid var(--border);background:var(--surface);
  color:var(--text);font-size:.9rem;outline:none;
  transition:border-color .2s;
}
.search-box input:focus{border-color:var(--accent)}
.search-box svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-dim)}
.search-box input::placeholder{color:var(--text-dim)}
.back-btn{
  display:none;align-items:center;gap:4px;
  background:none;border:none;color:var(--text);font-size:1rem;cursor:pointer;
}
.back-btn svg{width:20px;height:20px}

/* Categories */
.categories{
  overflow-x:auto;white-space:nowrap;
  padding:12px 16px;max-width:1200px;margin:0 auto;
  -webkit-overflow-scrolling:touch;scrollbar-width:none;
}
.categories::-webkit-scrollbar{display:none}
.cat-btn{
  display:inline-block;padding:6px 16px;margin-right:8px;
  border-radius:20px;border:1px solid var(--border);
  background:transparent;color:var(--text-dim);
  font-size:.85rem;cursor:pointer;transition:all .2s;white-space:nowrap;
}
.cat-btn:hover{border-color:var(--accent);color:var(--text)}
.cat-btn.active{
  background:linear-gradient(135deg,var(--grad1),var(--accent2));
  border-color:transparent;color:#fff;font-weight:600;
}

/* Main grid */
.main{max-width:1200px;margin:0 auto;padding:8px 16px 80px}
.grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:16px;
}
@media(min-width:640px){.grid{grid-template-columns:repeat(auto-fill,minmax(180px,1fr))}}
@media(min-width:1024px){.grid{grid-template-columns:repeat(5,1fr)}}

/* Cards */
.card{
  border-radius:var(--radius);overflow:hidden;
  background:var(--card);cursor:pointer;
  transition:transform .2s,box-shadow .2s;
}
.card:hover{transform:translateY(-4px);box-shadow:0 8px 24px rgba(233,69,96,.15)}
.card-img{
  aspect-ratio:3/4;overflow:hidden;position:relative;
  background:var(--surface);
}
.card-img img{
  width:100%;height:100%;object-fit:cover;
  transition:transform .3s;
}
.card:hover .card-img img{transform:scale(1.05)}
.card-badge{
  position:absolute;top:8px;left:8px;
  background:linear-gradient(135deg,var(--grad1),var(--accent2));
  color:#fff;font-size:.7rem;padding:2px 8px;border-radius:10px;font-weight:600;
}
.card-views{
  position:absolute;bottom:8px;right:8px;
  background:rgba(0,0,0,.7);color:#fff;font-size:.7rem;
  padding:2px 8px;border-radius:10px;
  display:flex;align-items:center;gap:4px;
}
.card-body{padding:10px}
.card-title{
  font-size:.9rem;font-weight:600;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
  overflow:hidden;line-height:1.3;min-height:2.4em;
}
.card-meta{font-size:.75rem;color:var(--text-dim);margin-top:4px}

/* Detail page */
.detail{display:none;padding-bottom:80px}
.detail.show{display:block}
.detail-hero{position:relative}
.detail-cover{
  width:100%;aspect-ratio:16/9;object-fit:cover;
  filter:brightness(.5);
}
.detail-overlay{
  position:absolute;bottom:0;left:0;right:0;
  padding:24px 16px;
  background:linear-gradient(transparent,rgba(10,10,15,.95));
}
.detail-info{max-width:1200px;margin:0 auto;padding:16px}
.detail-title{font-size:1.5rem;font-weight:800;margin-bottom:8px}
.detail-meta{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.detail-tag{
  padding:3px 10px;border-radius:12px;font-size:.75rem;
  background:var(--surface);border:1px solid var(--border);
}
.detail-synopsis{
  color:var(--text-dim);line-height:1.7;margin-bottom:16px;
  font-size:.9rem;
}
.detail-synopsis.collapsed{
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;
}
.read-more{
  background:none;border:none;color:var(--accent);cursor:pointer;font-size:.85rem;
}
.actors{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
.actor{
  display:flex;align-items:center;gap:6px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:20px;padding:4px 12px 4px 4px;font-size:.8rem;
}
.actor-avatar{
  width:28px;height:28px;border-radius:50%;
  background:linear-gradient(135deg,var(--grad1),var(--grad2));
  display:flex;align-items:center;justify-content:center;
  font-size:.65rem;color:#fff;font-weight:700;
}
.episodes-header{
  font-size:1.1rem;font-weight:700;margin-bottom:12px;
  display:flex;align-items:center;justify-content:space-between;
}
.episodes-header span{font-size:.85rem;color:var(--text-dim);font-weight:400}
.episode-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px}
.ep-btn{
  padding:10px 8px;border-radius:var(--radius-sm);
  background:var(--surface);border:1px solid var(--border);
  color:var(--text);font-size:.85rem;text-align:center;
  cursor:pointer;transition:all .2s;
}
.ep-btn:hover{border-color:var(--accent);background:var(--card-hover)}
.ep-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}

/* Player */
.player-page{display:none;padding-bottom:80px}
.player-page.show{display:block}
.player-container{
  position:relative;width:100%;
  background:#000;aspect-ratio:16/9;
}
.player-container video{
  width:100%;height:100%;object-fit:contain;
}
.player-placeholder{
  width:100%;height:100%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:16px;color:var(--text-dim);
}
.player-placeholder svg{width:64px;height:64px;opacity:.5}
.player-info{max-width:1200px;margin:0 auto;padding:16px}
.player-title{font-size:1.2rem;font-weight:700;margin-bottom:4px}
.player-ep{font-size:.85rem;color:var(--text-dim);margin-bottom:16px}
.player-controls{
  display:flex;gap:8px;flex-wrap:wrap;
}
.btn-play{
  padding:10px 24px;border-radius:24px;border:none;
  background:linear-gradient(135deg,var(--grad1),var(--accent2));
  color:#fff;font-size:1rem;font-weight:600;cursor:pointer;
  display:flex;align-items:center;gap:8px;transition:opacity .2s;
}
.btn-play:hover{opacity:.85}
.btn-ext{
  padding:10px 24px;border-radius:24px;
  border:1px solid var(--border);background:transparent;
  color:var(--text);font-size:.9rem;cursor:pointer;
  display:flex;align-items:center;gap:8px;transition:border-color .2s;
}
.btn-ext:hover{border-color:var(--accent)}

/* Load more */
.load-more{
  display:block;width:100%;max-width:300px;
  margin:24px auto;padding:12px;border-radius:24px;
  border:1px solid var(--accent);background:transparent;
  color:var(--accent);font-size:.95rem;font-weight:600;cursor:pointer;
  transition:all .2s;
}
.load-more:hover{background:var(--accent);color:#fff}
.load-more:disabled{opacity:.4;cursor:not-allowed}

/* Loading spinner */
.spinner{
  display:flex;justify-content:center;padding:40px;
}
.spinner::after{
  content:'';width:32px;height:32px;
  border:3px solid var(--border);border-top-color:var(--accent);
  border-radius:50%;animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* Empty state */
.empty{
  text-align:center;padding:60px 16px;color:var(--text-dim);
}
.empty svg{width:64px;height:64px;margin-bottom:12px;opacity:.4}

/* Toast */
.toast{
  position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
  background:var(--surface);border:1px solid var(--border);
  padding:10px 20px;border-radius:24px;font-size:.85rem;
  opacity:0;transition:opacity .3s;pointer-events:none;z-index:200;
}
.toast.show{opacity:1}

/* Page transitions */
.page{animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* Scrollbar */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="logo" id="logoBtn">Drama<span>Box</span></div>
    <button class="back-btn" id="backBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      ย้อนกลับ
    </button>
    <div class="search-box" id="searchBox">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <input type="text" id="searchInput" placeholder="ค้นหาซีรีส์...">
    </div>
  </div>
</header>

<nav class="categories" id="categories"></nav>

<main class="main" id="mainPage">
  <div class="grid" id="dramaGrid"></div>
  <button class="load-more" id="loadMore" style="display:none">โหลดเพิ่มเติม</button>
  <div class="spinner" id="mainSpinner" style="display:none"></div>
</main>

<section class="detail" id="detailPage">
  <div class="detail-hero">
    <img class="detail-cover" id="detailCover" src="" alt="">
    <div class="detail-overlay">
      <div class="detail-title" id="detailTitle"></div>
    </div>
  </div>
  <div class="detail-info">
    <div class="detail-meta" id="detailMeta"></div>
    <p class="detail-synopsis collapsed" id="detailSynopsis"></p>
    <button class="read-more" id="readMore">อ่านเพิ่มเติม</button>
    <div class="actors" id="detailActors"></div>
    <div class="episodes-header">
      ตอนทั้งหมด <span id="epCount"></span>
    </div>
    <div class="episode-list" id="episodeList"></div>
  </div>
</section>

<section class="player-page" id="playerPage">
  <div class="player-container" id="playerContainer">
    <div class="player-placeholder">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      <div>กดปุ่มเพื่อเล่น</div>
    </div>
  </div>
  <div class="player-info">
    <div class="player-title" id="playerTitle"></div>
    <div class="player-ep" id="playerEp"></div>
    <div class="player-controls">
      <button class="btn-play" id="playBtn">
        <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><polygon points="5 3 19 12 5 21"/></svg>
        เล่นตอนนี้
      </button>
      <button class="btn-ext" id="extPlayBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        เปิดบน otp24hr
      </button>
    </div>
  </div>
</section>

<div class="toast" id="toast"></div>

<script>
const API_BASE = window.location.pathname.replace(/\/[^/]*$/, '');
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);

let state = {
  page: 'home',
  pageNo: 1,
  pageSize: 20,
  typeId: 0,
  types: [],
  currentBook: null,
  currentEp: 1,
  loading: false,
  searchQuery: '',
  searchTimeout: null,
  synopsisExpanded: false,
};

// --- API ---
async function api(path, body) {
  try {
    const r = await fetch(`${API_BASE}${path}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return await r.json();
  } catch (e) {
    console.error('API error:', e);
    toast('เกิดข้อผิดพลาด กรุณาลองใหม่');
    return null;
  }
}

async function browseDramas(typeId = 0, pageNo = 1, append = false) {
  if (state.loading) return;
  state.loading = true;
  if (!append) {
    $('#dramaGrid').innerHTML = '';
    state.pageNo = 1;
  }
  $('#mainSpinner').style.display = '';
  $('#loadMore').style.display = 'none';

  const endpoint = '/api/browse';
  const reqBody = { typeTwoId: typeId, pageNo, pageSize: state.pageSize };
  if (state.searchQuery) reqBody.keyword = state.searchQuery;
  const res = await api(endpoint, reqBody);

  if (res?.data) {
    const list = res.data.bookList || res.data.list || [];
    if (res.data.types && !append) {
      state.types = res.data.types;
      renderCategories();
    }
    renderCards(list, append);
    if (list.length >= state.pageSize) {
      $('#loadMore').style.display = '';
    }
  }
  $('#mainSpinner').style.display = 'none';
  state.loading = false;
}

async function loadDetail(bookId) {
  const res = await api('/api/detail', { bookId, language: 'th' });
  if (!res?.data?.book) {
    toast('ไม่พบข้อมูลซีรีส์');
    return;
  }
  state.currentBook = res.data.book;
  showDetail(res.data.book);
}

// --- Render ---
function renderCategories() {
  const el = $('#categories');
  const allBtn = `<button class="cat-btn active" data-id="0">ทั้งหมด</button>`;
  const btns = state.types.map(t =>
    `<button class="cat-btn" data-id="${t.id || t.typeTwoId}">${t.name || t.typeTwoName}</button>`
  ).join('');
  el.innerHTML = allBtn + btns;
  el.querySelectorAll('.cat-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      el.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.typeId = +btn.dataset.id;
      state.searchQuery = '';
      $('#searchInput').value = '';
      browseDramas(state.typeId);
    });
  });
}

function renderCards(list, append) {
  const grid = $('#dramaGrid');
  const html = list.map(b => `
    <div class="card" data-id="${b.bookId}">
      <div class="card-img">
        <img src="${b.cover}" alt="${esc(b.bookName)}" loading="lazy" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22300%22 height=%22400%22><rect fill=%22%23181828%22 width=%22300%22 height=%22400%22/><text x=%22150%22 y=%22200%22 text-anchor=%22middle%22 fill=%22%23555%22 font-size=%2216%22>No Image</text></svg>'">
        ${b.chapterCount ? `<div class="card-badge">${b.chapterCount} ตอน</div>` : ''}
        ${b.viewCountDisplay ? `<div class="card-views"><svg viewBox="0 0 24 24" fill="currentColor" width="10" height="10"><path d="M12 4.5C7 4.5 2.7 7.6 1 12c1.7 4.4 6 7.5 11 7.5s9.3-3.1 11-7.5c-1.7-4.4-6-7.5-11-7.5zm0 12c-2.5 0-4.5-2-4.5-4.5S9.5 7.5 12 7.5s4.5 2 4.5 4.5-2 4.5-4.5 4.5z"/></svg>${b.viewCountDisplay}</div>` : ''}
      </div>
      <div class="card-body">
        <div class="card-title">${esc(b.bookName)}</div>
        <div class="card-meta">${Array.isArray(b.labels) ? b.labels.join(' · ') : (b.labels || '')}</div>
      </div>
    </div>
  `).join('');
  if (append) grid.innerHTML += html;
  else grid.innerHTML = html;

  grid.querySelectorAll('.card').forEach(card => {
    card.addEventListener('click', () => {
      loadDetail(card.dataset.id);
    });
  });
}

function showDetail(book) {
  state.page = 'detail';
  state.synopsisExpanded = false;
  $('#mainPage').style.display = 'none';
  $('#playerPage').classList.remove('show');
  $('#categories').style.display = 'none';
  $('#searchBox').style.display = 'none';
  $('#backBtn').style.display = '';
  $('#logoBtn').style.display = 'none';
  $('#detailPage').classList.add('show');
  $('#detailPage').classList.add('page');

  $('#detailCover').src = book.cover || '';
  $('#detailTitle').textContent = book.bookName;
  $('#detailSynopsis').textContent = book.introduction || 'ไม่มีเรื่องย่อ';
  $('#detailSynopsis').classList.add('collapsed');
  $('#readMore').textContent = 'อ่านเพิ่มเติม';

  const meta = $('#detailMeta');
  const tags = [];
  if (book.chapterCount) tags.push(`${book.chapterCount} ตอน`);
  if (book.viewCountDisplay) tags.push(`${book.viewCountDisplay} วิว`);
  if (book.labels) {
    const lblArr = Array.isArray(book.labels) ? book.labels : [book.labels];
    lblArr.forEach(l => tags.push(l));
  }
  (book.tags || []).forEach(t => tags.push(t.tagName || t));
  meta.innerHTML = tags.map(t => `<span class="detail-tag">${esc(t)}</span>`).join('');

  const actors = $('#detailActors');
  const performerList = book.performerList || [];
  actors.innerHTML = performerList.map(p => {
    const name = p.performerName || p.name || '';
    const initial = name.charAt(0) || '?';
    return `<div class="actor">
      <div class="actor-avatar">${esc(initial)}</div>
      ${esc(name)}
    </div>`;
  }).join('');

  const count = book.chapterCount || 0;
  $('#epCount').textContent = `${count} ตอน`;
  const epList = $('#episodeList');
  let epHtml = '';
  for (let i = 1; i <= Math.min(count, 200); i++) {
    epHtml += `<button class="ep-btn" data-ep="${i}">${i}</button>`;
  }
  epList.innerHTML = epHtml;
  epList.querySelectorAll('.ep-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      showPlayer(book, +btn.dataset.ep);
    });
  });
}

function showPlayer(book, ep) {
  state.page = 'player';
  state.currentEp = ep;
  $('#detailPage').classList.remove('show');
  $('#playerPage').classList.add('show');
  $('#playerPage').classList.add('page');

  $('#playerTitle').textContent = book.bookName;
  $('#playerEp').textContent = `ตอนที่ ${ep}`;
  $('#playBtn').onclick = () => tryPlayVideo(book.bookId, ep);
  $('#extPlayBtn').onclick = () => {
    window.open(`https://www.otp24hr.com/api/v1/loadapi_series/api?endpoint=video_dramabox&id=${book.bookId}&chapterId=${ep}&category_p=dramabox&lang=th`, '_blank');
  };

  // Reset player
  $('#playerContainer').innerHTML = `
    <div class="player-placeholder">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="64" height="64"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      <div>กดปุ่ม "เล่นตอนนี้" เพื่อเริ่ม</div>
    </div>
  `;
}

function tryPlayVideo(bookId, ep) {
  // Try the otp24hr API endpoint to get video URL
  const url = `https://www.otp24hr.com/api/v1/loadapi_series/api?endpoint=video_dramabox&id=${bookId}&chapterId=${ep}&category_p=dramabox&lang=th`;
  toast('กำลังโหลดวิดีโอ...');

  // Try fetching through our proxy or directly
  fetch(url)
    .then(r => r.json())
    .then(data => {
      if (data?.url || data?.videoUrl || data?.data?.url) {
        const videoUrl = data.url || data.videoUrl || data.data?.url;
        playVideo(videoUrl);
      } else {
        // Open in new tab as fallback
        window.open(url, '_blank');
        toast('เปิดในหน้าต่างใหม่');
      }
    })
    .catch(() => {
      // Fallback: open otp24hr page
      window.open(url, '_blank');
      toast('เปิดในหน้าต่างใหม่');
    });
}

function playVideo(url) {
  $('#playerContainer').innerHTML = `
    <video controls autoplay playsinline>
      <source src="${url}" type="video/mp4">
      เบราว์เซอร์ไม่รองรับการเล่นวิดีโอ
    </video>
  `;
}

// --- Navigation ---
function goHome() {
  state.page = 'home';
  state.currentBook = null;
  state.searchQuery = '';
  $('#searchInput').value = '';
  $('#detailPage').classList.remove('show');
  $('#playerPage').classList.remove('show');
  $('#mainPage').style.display = '';
  $('#categories').style.display = '';
  $('#searchBox').style.display = '';
  $('#backBtn').style.display = 'none';
  $('#logoBtn').style.display = '';
  window.scrollTo(0, 0);
}

function goBack() {
  if (state.page === 'player') {
    state.page = 'detail';
    $('#playerPage').classList.remove('show');
    $('#detailPage').classList.add('show');
  } else if (state.page === 'detail') {
    goHome();
  }
}

// --- Utils ---
function esc(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

function toast(msg) {
  const t = $('#toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._tid);
  t._tid = setTimeout(() => t.classList.remove('show'), 2500);
}

// --- Events ---
$('#logoBtn').addEventListener('click', goHome);
$('#backBtn').addEventListener('click', goBack);
$('#loadMore').addEventListener('click', () => {
  state.pageNo++;
  browseDramas(state.typeId, state.pageNo, true);
});

$('#searchInput').addEventListener('input', (e) => {
  clearTimeout(state.searchTimeout);
  state.searchTimeout = setTimeout(() => {
    state.searchQuery = e.target.value.trim();
    if (state.searchQuery) {
      state.typeId = 0;
      $$('.cat-btn').forEach(b => b.classList.toggle('active', b.dataset.id === '0'));
    }
    browseDramas(state.typeId);
  }, 500);
});

$('#readMore').addEventListener('click', () => {
  state.synopsisExpanded = !state.synopsisExpanded;
  $('#detailSynopsis').classList.toggle('collapsed', !state.synopsisExpanded);
  $('#readMore').textContent = state.synopsisExpanded ? 'ย่อ' : 'อ่านเพิ่มเติม';
});

// Back button on Android/browser
window.addEventListener('popstate', goBack);

// Init
browseDramas();
</script>
</body>
</html>
